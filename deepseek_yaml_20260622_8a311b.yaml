name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # این خط اضافه شد تا بتوانید به‌صورت دستی هم اجرا کنید

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython
          sudo apt update
          sudo apt install -y zip unzip openjdk-17-jdk
      
      - name: Build APK
        run: |
          buildozer init
          sed -i 's/title = .*/title = Drought Stress RF/' buildozer.spec
          sed -i 's/package.name = .*/package.name = droughtstressrf/' buildozer.spec
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: drought-stress-app
          path: bin/*.apk